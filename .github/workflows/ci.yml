name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project and test dependencies
        run: uv sync --extra test

      - name: Run test suite
        run: uv run pytest tests

  tests-pyscf:
    name: Tests with PySCF (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project and test dependencies (with PySCF)
        run: uv sync --extra test-pyscf

      - name: Run PySCF comparison tests
        run: uv run pytest tests/test_gto.py

  tests-ase:
    name: Tests with ASE (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project and test dependencies (with ASE)
        run: uv sync --extra test-ase

      - name: Run ASE comparison tests
        run: uv run pytest tests/test_cif_vs_ase.py

  tests-trexio:
    name: Tests with TREXIO (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project, tests, and TREXIO
        run: uv sync --extra test-trexio

      - name: Run TREXIO-related tests
        run: uv run pytest tests/test_trexio_parser.py tests/test_filetype.py tests/test_app_trexio_mo.py

  tests-iodata:
    name: Tests with IODATA (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project and test dependencies (with IODATA)
        run: uv sync --extra test-iodata

      - name: Run IODATA comparison tests
        run: uv run pytest tests/test_fchk_iodata.py

  cclib-regression:
    name: cclib-data parser regression (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out cclib-data
        uses: actions/checkout@v4
        with:
          repository: cclib/cclib-data
          ref: e0a9ff4dc93c6818a39a7227a2cb272032f48d82
          path: data/regression
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project and test dependencies
        run: uv sync --extra test

      - name: Run direct cclib-data parser regression
        run: uv run python scripts/cclib_regression_check.py --baseline scripts/cclib_regression_baseline.json

      - name: Extract echoed inputs and run parser regression
        run: uv run python scripts/extract_and_check_inputs.py --baseline scripts/extracted_inputs_baseline.json
