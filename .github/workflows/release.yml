name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version_check.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      - name: Verify built version matches tag
        id: version_check
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          dist_dir = Path("dist")
          wheel_path = next(dist_dir.glob("*.whl"), None)
          if wheel_path is None:
              raise SystemExit("No wheel artifact found in dist/")

          metadata_version = None
          with zipfile.ZipFile(wheel_path) as zf:
              metadata_name = next(
                  (name for name in zf.namelist() if name.endswith(".dist-info/METADATA")),
                  None,
              )
              if metadata_name is None:
                  raise SystemExit("Could not locate METADATA in wheel")
              for line in zf.read(metadata_name).decode("utf-8").splitlines():
                  if line.startswith("Version: "):
                      metadata_version = line.split("Version: ", 1)[1].strip()
                      break

          if metadata_version is None:
              raise SystemExit("Could not read package version from wheel metadata")

          tag = os.environ["TAG_NAME"]
          tag_version = tag[1:] if tag.startswith("v") else tag
          if metadata_version != tag_version:
              raise SystemExit(
                  f"Built package version '{metadata_version}' does not match tag version '{tag_version}'"
              )

          output_file = Path(os.environ["GITHUB_OUTPUT"])
          with output_file.open("a", encoding="utf-8") as f:
              f.write(f"version={metadata_version}\n")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
